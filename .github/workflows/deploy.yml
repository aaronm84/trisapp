name: Deploy PWA to GitHub Pages

# The mirror step needs network access to akouzoukos.com (or a release feed).
# It runs on every push to the default branch and on manual dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Install wget
        run: sudo apt-get update -qq && sudo apt-get install -y -qq wget

      - name: Mirror site
        run: ./scripts/mirror.sh

      - name: Build PWA
        run: ./scripts/build.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
